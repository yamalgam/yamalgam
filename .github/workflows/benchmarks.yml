name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_gungraun:
        description: 'Skip gungraun benchmarks'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Divan benchmarks run on all platforms
  divan:
    name: Divan (wall-clock)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1


      - name: Generate benchmark harnesses
        run: cargo xtask gen-benchmarks


      - name: Run Divan benchmarks
        run: |
          mkdir -p bench-reports
          cargo bench --bench divan_benchmarks 2>&1 | tee bench-reports/divan-ci.txt

      - name: Upload Divan results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: divan-results
          path: bench-reports/divan-ci.txt
          retention-days: 30

  # Gungraun requires Valgrind (Linux only, no ARM64)
  gungraun:
    name: Gungraun (instruction count)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ !inputs.skip_gungraun }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install gungraun-runner
        uses: ./.github/actions/setup-cargo-tools
        with:
          binstall-tools: gungraun-runner


      - name: Generate benchmark harnesses
        run: cargo xtask gen-benchmarks


      - name: Run Gungraun benchmarks
        run: |
          mkdir -p bench-reports
          cargo bench --bench gungraun_benchmarks 2>&1 | tee bench-reports/gungraun-ci.txt

      - name: Upload Gungraun results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gungraun-results
          path: bench-reports/gungraun-ci.txt
          retention-days: 30

  # Comparative benchmarks (yamalgam vs YAML peers)
  comparative:
    name: Comparative (vs peers)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run comparative benchmarks
        run: |
          mkdir -p bench-reports
          cargo bench -p yamalgam-bench 2>&1 | tee bench-reports/comparative-ci.txt

      - name: Upload comparative results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: comparative-results
          path: bench-reports/comparative-ci.txt
          retention-days: 30

  # Scanner and parser self-benchmarks
  self-benchmarks:
    name: Self-benchmarks (scanner + parser)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run scanner benchmarks
        run: |
          mkdir -p bench-reports
          cargo bench -p yamalgam-scanner 2>&1 | tee bench-reports/scanner-ci.txt

      - name: Run parser benchmarks
        run: |
          cargo bench -p yamalgam-parser 2>&1 | tee bench-reports/parser-ci.txt

      - name: Upload self-benchmark results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: self-benchmark-results
          path: bench-reports/
          retention-days: 30

  # CLI benchmarks with hyperfine
  cli:
    name: CLI (hyperfine)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Install hyperfine
        uses: ./.github/actions/setup-cargo-tools
        with:
          binstall-tools: hyperfine

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run CLI benchmarks
        run: |
          chmod +x ./scripts/bench-cli.sh
          ./scripts/bench-cli.sh --quick

      - name: Upload CLI benchmark results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cli-benchmark-results
          path: bench-reports/
          retention-days: 30


  # Summary job that collects all results
  summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs: [divan, gungraun, comparative, self-benchmarks, cli]

    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@a9bc5e6ef2cb54c177f32aa5726adaa15e7e2d59 # v8.0.1
        with:
          path: all-results

      - name: Create summary
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f all-results/divan-results/divan-ci.txt ]; then
            echo "### Divan (Wall-Clock)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 all-results/divan-results/divan-ci.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f all-results/gungraun-results/gungraun-ci.txt ]; then
            echo "### Gungraun (Instruction Count)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 all-results/gungraun-results/gungraun-ci.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f all-results/comparative-results/comparative-ci.txt ]; then
            echo "### Comparative (vs Peers)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 all-results/comparative-results/comparative-ci.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f all-results/self-benchmark-results/scanner-ci.txt ]; then
            echo "### Scanner Self-Benchmarks" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 all-results/self-benchmark-results/scanner-ci.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f all-results/self-benchmark-results/parser-ci.txt ]; then
            echo "### Parser Self-Benchmarks" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 all-results/self-benchmark-results/parser-ci.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f all-results/cli-benchmark-results/hyperfine-startup.md ]; then
            echo "### CLI (Hyperfine)" >> $GITHUB_STEP_SUMMARY
            cat all-results/cli-benchmark-results/hyperfine-startup.md >> $GITHUB_STEP_SUMMARY
          fi

