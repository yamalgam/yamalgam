boundaries:
  - name: untrusted_input
    description: >-
      All YAML input is untrusted. The scanner, parser, and all consumers
      (compose, serde, cst) process arbitrary user-supplied YAML documents.
      This is the primary trust boundary.
    modules:
      - yamalgam-scanner
      - yamalgam-parser
      - yamalgam-compose
      - yamalgam-serde
      - yamalgam-cst
    notes: >-
      ResourceLimits (LoaderConfig) protect against Billion Laughs,
      deep nesting, and oversized scalars. Scanner and parser both
      accept LoaderConfig via with_config().

  - name: configuration
    description: >-
      LoaderConfig controls security limits. Misconfigured limits
      (e.g., unchecked preset) could expose consumers to DoS.
    modules:
      - yamalgam-core
    notes: >-
      Four presets: moderate (default), strict, trusted, unchecked.
      Scanner new() uses ResourceLimits::none() (const fn).

  - name: filesystem
    description: >-
      CLI reads YAML files from disk. Config loading reads from
      XDG directories. Future !include resolver will also read files.
    modules:
      - yamalgam
      - yamalgam-core
    notes: >-
      !include not yet implemented (M11). Current filesystem access
      is limited to CLI input files and config.
