# .bito.yaml — generated by building-in-the-open plugin
# Edit freely. Re-run plugin setup to regenerate from defaults.

dialect: en-us
max_grade: 12.0
passive_max_percent: 15.0
tokenizer: claude

rules:
  - paths: [".handoffs/*.md"]
    checks:
      completeness:
        template: handoff
      tokens:
        budget: 2000

  - paths: ["record/decisions/*.md"]
    checks:
      completeness:
        template: adr
      readability:
        max_grade: 12.0

  - paths: ["record/designs/*.md"]
    checks:
      completeness:
        template: design-doc
      readability:
        max_grade: 12.0

  - paths: ["docs/**/*.md", "README.md"]
    checks:
      readability:
        max_grade: 12.0
      grammar:
        passive_max: 15.0
